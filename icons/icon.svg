<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13131f"/>
      <stop offset="100%" style="stop-color:#0b0b14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8def"/>
      <stop offset="100%" style="stop-color:#3a72d8"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5b8def"/>
      <stop offset="100%" style="stop-color:#5b8def;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fba74"/>
      <stop offset="100%" style="stop-color:#3fba74;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff7c3e"/>
      <stop offset="100%" style="stop-color:#ff7c3e;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Top accent line -->
  <rect x="60" y="60" width="392" height="4" rx="2" fill="url(#accent)" opacity="0.6"/>
  <!-- RS Monogram -->
  <text x="256" y="240" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="180" font-weight="800" fill="url(#accent)"
        text-anchor="middle" letter-spacing="-8">RS</text>
  <!-- Macro bars -->
  <rect x="80" y="300" width="352" height="10" rx="5" fill="#252542"/>
  <rect x="80" y="300" width="240" height="10" rx="5" fill="url(#bar1)"/>
  <rect x="80" y="324" width="352" height="10" rx="5" fill="#252542"/>
  <rect x="80" y="324" width="310" height="10" rx="5" fill="url(#bar2)"/>
  <rect x="80" y="348" width="352" height="10" rx="5" fill="#252542"/>
  <rect x="80" y="348" width="180" height="10" rx="5" fill="url(#bar3)"/>
  <!-- Label -->
  <text x="256" y="420" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="36" font-weight="500" fill="#5566a0"
        text-anchor="middle" letter-spacing="6">RECOMP</text>
  <!-- Bottom accent -->
  <rect x="60" y="448" width="392" height="4" rx="2" fill="url(#accent)" opacity="0.3"/>
</svg>
