<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full bleed background for maskable (safe zone is center 80%) -->
  <rect width="512" height="512" fill="#0b0b14"/>
  <defs>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b8def"/>
      <stop offset="100%" style="stop-color:#3a72d8"/>
    </linearGradient>
  </defs>
  <text x="256" y="290" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="200" font-weight="800" fill="url(#acc)"
        text-anchor="middle" letter-spacing="-8">RS</text>
  <text x="256" y="360" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-size="38" font-weight="500" fill="#5566a0"
        text-anchor="middle" letter-spacing="6">RECOMP</text>
</svg>
